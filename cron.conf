# ============================================================
# Configuration CRON — Plateforme de Suivi Académique
# ============================================================
# Mémoire §3.2.1 : "déclenché automatiquement par un scheduler
# nuitamment après chaque synchronisation ETL".
#
# Installation (sur le serveur applicatif) :
#   crontab -e
# puis coller les lignes ci-dessous en adaptant les chemins.
#
# Variables d'environnement requises (définir dans le crontab ou un .env
# chargé par le wrapper) :
#   DJANGO_SETTINGS_MODULE=config.settings.prod
#   PATH=/usr/local/bin:/usr/bin:/bin
#   PYTHONPATH=/opt/suivi-academique
# ============================================================

# --- Synchronisation ETL nocturne (tous les jours à 02h00) ---
# Extrait les données de service.campusfaso.bf (différentiel), charge le DW,
# puis recalcule automatiquement les KPI et génère les alertes.
0 2 * * * cd /opt/suivi-academique && /opt/suivi-academique/venv/bin/python manage.py etl_run >> /var/log/suivi/etl.log 2>&1

# --- Recalcul KPI / alertes autonome (tous les jours à 03h00) ---
# Utile si l'ETL a été lancé manuellement sans --kpi, ou pour rafraîchir
# les seuils après un changement de ParametreAlerte.
0 3 * * * cd /opt/suivi-academique && /opt/suivi-academique/venv/bin/python manage.py kpi_compute >> /var/log/suivi/kpi.log 2>&1

# --- Archivage des alertes traitées (chaque semaine, dimanche 04h00) ---
# Archive les alertes en statut "Traitée" de plus de 90 jours.
0 4 * * 0 cd /opt/suivi-academique && /opt/suivi-academique/venv/bin/python manage.py archiver_alertes >> /var/log/suivi/archive.log 2>&1

# --- Sauvegarde de la base PostgreSQL (chaque jour à 01h00, avant l'ETL) ---
# BF non fonctionnel "Sauvegarde" : dumps quotidiens conservés 7 jours.
0 1 * * * pg_dump -U suivi -h 127.0.0.1 suivi_academique | gzip > /var/backups/suivi/suivi_$(date +\%Y\%m\%d).sql.gz && find /var/backups/suivi -name "suivi_*.sql.gz" -mtime +7 -delete

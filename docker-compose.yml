# Docker Compose — PostgreSQL 16 pour la plateforme décisionnelle
# Usage : docker compose up -d
# La base héberge À LA FOIS les modèles OLTP (source ETL) et le Data Warehouse (schéma étoile).
services:
  db:
    image: postgres:16
    container_name: suivi_academique_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-suivi_academique}
      POSTGRES_USER: ${POSTGRES_USER:-suivi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suivi_dev}
      # C.UTF-8 est toujours disponible dans l'image postgres ; le tri/collation
      # à la française est géré au niveau applicatif (Django), pas par le SGBD.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
      TZ: Africa/Ouagadougou
      PGTZ: Africa/Ouagadougou
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-suivi} -d ${POSTGRES_DB:-suivi_academique}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (optionnel) — interface web d'administration de PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: suivi_academique_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@suivi.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["pgadmin"]   # démarré uniquement avec : docker compose --profile pgadmin up

volumes:
  pgdata:
    driver: local

{% load static %}
<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Académique</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .hero-container { background: white; border-radius: 1rem; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 3rem; max-width: 600px; }
        .hero-container h1 { color: #2b6cb0; margin-bottom: 1rem; font-weight: 700; }
        .hero-container .lead { color: #4a5568; font-size: 1.1rem; }
        .btn { padding: 0.75rem 1.5rem; font-weight: 600; }
        .text-muted { color: #718096 !important; }
        code { background: #edf2f7; padding: .15rem .4rem; border-radius: 4px; }
        hr { margin: 2rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-container text-center">
            <h1><i class="bi bi-graph-up-arrow me-2"></i>Suivi Académique</h1>
            <p class="lead text-muted mb-4">
                Plateforme décisionnelle complémentaire à <code>service.campusfaso.bf</code>
            </p>
            <p class="text-muted small mb-4">
                Suivi des étudiants · Gestion des risques · KPI académiques · Rapports de pilotage
            </p>
            
            <a href="{% url 'dashboards:login' %}" class="btn btn-primary btn-lg w-100 mb-4">
                <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
            </a>
            
            <hr>
            
            <p class="text-muted small mb-3">📚 Ressources</p>
            <div class="d-grid gap-2">
                <a href="/api/docs/" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-book me-1"></i>Documentation API (Swagger)
                </a>
                <a href="/admin/" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-gear-fill me-1"></i>Administration
                </a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

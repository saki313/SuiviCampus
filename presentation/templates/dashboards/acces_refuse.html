{% extends "base.html" %}

{% block title %}Accès refusé — Suivi Académique{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="alert alert-danger d-flex align-items-start shadow-sm" role="alert">
      <i class="bi bi-shield-lock-fill fs-2 me-3"></i>
      <div>
        <h2 class="h5 alert-heading mb-2">Accès refusé</h2>
        <p class="mb-3">{{ message|default:"Vous n'avez pas les autorisations nécessaires pour accéder à cette page." }}</p>
        <a href="{% url 'dashboards:accueil' %}" class="btn btn-outline-danger btn-sm">
          <i class="bi bi-house-door me-1"></i>Retour à l'accueil
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

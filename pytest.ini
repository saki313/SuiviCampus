[pytest]
# Configuration pytest-django
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Tests
python_functions = test_*
addopts = -ra --strict-markers --reuse-db
markers =
    domain: tests de la couche métier pure (sans base de données)
    api: tests de l'API REST
    service: tests des services applicatifs
    etl: tests du moteur ETL
    kpi: tests des calculs KPI / score de risque
    slow: tests lents (intégration complète)
